<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お米タイピング - KomeTyping</title>
    <style>
        /* 背景：Pop風の斜めストライプ（少し細かくしたよ） */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: repeating-linear-gradient(
                45deg,
                #666,
                #666 10px,
                #777 10px,
                #777 20px
            );
            font-family: "Hiragino Sans", "Meiryo", sans-serif;
            overflow: hidden;
        }

        /* ゲーム画面：400x300のコンパクトサイズ */
        #game-window {
            width: 400px;
            height: 300px;
            background-color: #333;
            border: 5px solid #222;
            border-radius: 10px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            /* 中に薄いドット模様を入れてデジタル感を出す */
            background-image: radial-gradient(#444 1px, transparent 1px);
            background-size: 10px 10px;
        }

        /* タイトル：滑らかで綺麗なフチ取りに修正版 */
        h1 {
            position: absolute;
            top: 40px;
            width: 100%;
            text-align: center;
            font-size: 2.2rem;
            color: #ffcc00;
            margin: 0;
            font-family: 'Arial Black', sans-serif;
            
            /* 滑らかにするために、上下左右と斜め全方位に影を配置 */
            text-shadow: 
                2px 2px 0 #fff,   -2px -2px 0 #fff,
                2px -2px 0 #fff,  -2px 2px 0 #fff,
                /* さらに隙間を埋める影を足す */
                1.5px 0 0 #fff,   -1.5px 0 0 #fff,
                0 1.5px 0 #fff,   0 -1.5px 0 #fff,
                1px 2px 0 #fff,   -1px -2px 0 #fff,
                2px 1px 0 #fff,   -2px -1px 0 #fff,
                
                /* 一番下の緑の影も滑らかに */
                4px 4px 0 #2e7d32,
                3.5px 4.5px 0 #2e7d32,
                4.5px 3.5px 0 #2e7d32;
        }

        /* スコア表示（左上） */
        #score-board {
            position: absolute;
            top: 10px;
            left: 15px;
            color: #fff;
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* 漢字とローマ字：サイズを調整 */
        #kanji {
            font-size: 1.2rem;
            color: #bbb;
            margin-bottom: 5px;
            height: 1.2em;
        }

        #word {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00e5ff;
            text-shadow: 0 0 10px rgba(0,229,255,0.4);
            font-family: 'Courier New', Courier, monospace;
        }

        /* ボタン：小さくして並べる */
        .btn-group {
            margin-top: 25px;
            display: flex;
            gap: 10px;
        }

        .pop-button {
            padding: 6px 15px;
            font-size: 0.8rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(to bottom, #ff9900, #cc7700);
            border: none;
            border-radius: 20px;
            box-shadow: 0 3px #995500;
            cursor: pointer;
        }

        .pop-button:active {
            box-shadow: none;
            transform: translateY(3px);
        }

        /* バージョン表記（右下） */
        .version {
            position: absolute;
            bottom: 8px;
            right: 12px;
            color: #666;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

    <div id="game-window">
        <div id="score-board">スコア: <span id="rice-count">0</span> 粒</div>
        
        <h1>お米タイピング</h1>
        
        <div id="kanji">Loading...</div>
        <div id="word"></div>

        <div class="btn-group">
            <button class="pop-button" onclick="location.reload()">リセット</button>
            <button class="pop-button" style="background: linear-gradient(to bottom, #555, #222); box-shadow: 0 3px #000;">設定</button>
        </div>

        <div class="version">Ver.1.0 ©KomeTyping</div>
    </div>

    <script type="module">
        let wordList = [];
        let currentRoma = '';
        let charIndex = 0;
        let riceCount = 0;

        const kanjiDisplay = document.getElementById('kanji');
        const wordDisplay = document.getElementById('word');
        const riceDisplay = document.getElementById('rice-count');

        async function initGame() {
            try {
                const response = await fetch('words.json');
                wordList = await response.json();
                setWord();
            } catch (e) {
                kanjiDisplay.textContent = "Error!";
                wordDisplay.textContent = "words.jsonを確認してね";
            }
        }

        function setWord() {
            if (wordList.length === 0) return;
            const pair = wordList[Math.floor(Math.random() * wordList.length)];
            kanjiDisplay.textContent = pair.kanji;
            currentRoma = pair.roma;
            charIndex = 0;
            updateDisplay();
        }

        function updateDisplay() {
            const typedPart = "_".repeat(charIndex);
            const untypedPart = currentRoma.substring(charIndex);
            wordDisplay.textContent = typedPart + untypedPart;
        }

        window.addEventListener('keydown', (e) => {
            if (e.key.length !== 1) return;
            if (e.key === currentRoma[charIndex]) {
                charIndex++;
                riceCount++;
                riceDisplay.textContent = riceCount.toLocaleString();
                if (charIndex === currentRoma.length) {
                    setWord();
                } else {
                    updateDisplay();
                }
            }
        });

            initGame();
    </script>
</body>
</html>
