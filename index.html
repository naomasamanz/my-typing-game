<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お米タイピング - KomeTyping</title>
    <style>
        /* 1. 背景：画面全体をPop風の斜めストライプに */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: repeating-linear-gradient(
                45deg,
                #666,
                #666 15px,
                #777 15px,
                #777 30px
            );
            font-family: "Hiragino Sans", "Meiryo", sans-serif;
            overflow: hidden;
        }

        /* 2. ゲーム画面の「外枠」：Popタイピングのあのサイズ感 */
        #game-window {
            width: 400px;  /* 横幅を固定 */
            height: 300px; /* 縦幅を固定 */
            background-color: #444; /* 中の背景色 */
            border: 8px solid #333; /* 濃いめの枠 */
            border-radius: 15px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            /* 中の縞々 */
            background-image: repeating-linear-gradient(
                -45deg,
                rgba(255,255,255,0.02),
                rgba(255,255,255,0.02) 2px,
                transparent 2px,
                transparent 4px
            );
        }

        /* 3. タイトル：浮いている感じを出す */
        h1 {
            font-size: 4.5rem;
            color: #ffcc00; /* 黄色 */
            margin: 0 0 30px 0;
            /* 白と緑のフチ取りでPop風に */
            text-shadow: 
                4px 4px 0 #fff, -4px -4px 0 #fff,
                4px -4px 0 #fff, -4px 4px 0 #fff,
                6px 6px 0 #2e7d32; 
            transform: rotate(-3deg); /* 少し斜め */
            font-family: 'Arial Black', sans-serif;
        }

        /* スコア表示 */
        #score-board {
            position: absolute;
            top: 30px;
            left: 40px;
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
        }

        /* 漢字とローマ字 */
        #kanji {
            font-size: 2.2rem;
            color: #ddd;
            margin-bottom: 10px;
            height: 1.2em;
        }

        #word {
            font-size: 4.5rem;
            font-weight: bold;
            color: #00e5ff; /* 鮮やかな水色 */
            text-shadow: 0 0 20px rgba(0,229,255,0.4);
            font-family: 'Courier New', Courier, monospace;
        }

        /* 4. 下のボタン */
        .btn-group {
            margin-top: 50px;
            display: flex;
            gap: 20px;
        }

        .pop-button {
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(to bottom, #ff9900, #cc7700);
            border: none;
            border-radius: 50px;
            box-shadow: 0 5px #995500;
            cursor: pointer;
        }

        .pop-button:active {
            box-shadow: none;
            transform: translateY(5px);
        }

        /* バージョン表記（左下） */
        .version {
            position: absolute;
            bottom: 15px;
            left: 20px;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div id="game-window">
        <div id="score-board">ハイスコア: <span id="rice-count">0</span> 粒</div>
        
        <h1>お米タイピング</h1>
        
        <div id="kanji">Loading...</div>
        <div id="word"></div>

        <div class="btn-group">
            <button class="pop-button" onclick="location.reload()">リセット</button>
            <button class="pop-button" style="background: linear-gradient(to bottom, #555, #222); box-shadow: 0 5px #000;">設定</button>
        </div>

        <div class="version">Ver.1.0 ©KomeTyping</div>
    </div>

    <script type="module">
        let wordList = [];
        let currentRoma = '';
        let charIndex = 0;
        let riceCount = 0;

        const kanjiDisplay = document.getElementById('kanji');
        const wordDisplay = document.getElementById('word');
        const riceDisplay = document.getElementById('rice-count');

        async function initGame() {
            try {
                const response = await fetch('words.json');
                wordList = await response.json();
                setWord();
            } catch (e) {
                kanjiDisplay.textContent = "Error!";
                wordDisplay.textContent = "words.jsonを確認してね";
            }
        }

        function setWord() {
            if (wordList.length === 0) return;
            const pair = wordList[Math.floor(Math.random() * wordList.length)];
            kanjiDisplay.textContent = pair.kanji;
            currentRoma = pair.roma;
            charIndex = 0;
            updateDisplay();
        }

        function updateDisplay() {
            const typedPart = "_".repeat(charIndex);
            const untypedPart = currentRoma.substring(charIndex);
            wordDisplay.textContent = typedPart + untypedPart;
        }

        window.addEventListener('keydown', (e) => {
            if (e.key.length !== 1) return;
            if (e.key === currentRoma[charIndex]) {
                charIndex++;
                riceCount++;
                riceDisplay.textContent = riceCount.toLocaleString();
                if (charIndex === currentRoma.length) {
                    setWord();
                } else {
                    updateDisplay();
                }
            }
        });

        initGame();
    </script>
</body>
</html>
