<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お米タイピング</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: repeating-linear-gradient(45deg, #666, #666 10px, #777 10px, #777 20px);
            font-family: "Hiragino Sans", "Meiryo", sans-serif;
            overflow: hidden;
        }

        #game-window {
            width: 400px;
            height: 300px;
            background-color: #333;
            border: 5px solid #222;
            border-radius: 12px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            background-image: radial-gradient(#444 1px, transparent 1px);
            background-size: 10px 10px;
        }

        /* タイトル位置を微調整 */
        h1 {
            position: absolute;
            top: 55px; 
            width: 100%;
            text-align: center;
            font-size: 2.2rem;
            color: #ffcc00;
            margin: 0;
            font-family: 'Arial Black', sans-serif;
            -webkit-text-stroke: 1.5px #fff;
            z-index: 10;
        }

        /* スタート画面のオーバーレイ */
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            cursor: pointer;
        }

        /* Popタイピング風の黒いスタートボタン */
        .start-button {
            background-color: #111;
            color: #ffcc00;
            padding: 10px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            clip-path: polygon(5% 0%, 95% 0%, 100% 50%, 95% 100%, 5% 100%, 0% 50%); /* リボンの形 */
            box-shadow: 0 4px #000;
            transition: transform 0.1s;
        }

        .start-button:hover {
            transform: scale(1.05);
        }

        /* ゲーム中以外は隠す仕組み */
        .hidden {
            display: none !important;
        }

        #question-area {
            position: absolute;
            top: 130px; 
            width: 100%;
            text-align: center;
        }

        #kanji {
            font-size: 2.4rem;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 5px;
            height: 1.3em;
            text-shadow: 0 0 10px rgba(255,255,255,0.4);
        }

        #word {
            font-size: 1.4rem;
            font-weight: bold;
            color: #00e5ff;
            font-family: 'Courier New', Courier, monospace;
            white-space: nowrap;
        }

        .btn-group {
            position: absolute;
            bottom: 35px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .pop-button {
            padding: 8px 18px;
            font-size: 0.9rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(to bottom, #ff9900, #cc7700);
            border: none;
            border-radius: 20px;
            box-shadow: 0 4px #995500;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="game-window">
        <div id="start-screen" onclick="startGame()">
            <button class="start-button">スペースキーでスタート！</button>
        </div>

        <div id="score-board">スコア: <span id="rice-count">0</span> 粒</div>
        <h1>お米タイピング</h1>
        
        <div id="question-area" class="hidden">
            <div id="kanji">Loading...</div>
            <div id="word"></div>
        </div>

        <div class="btn-group">
            <button class="pop-button" onclick="location.reload()">リセット</button>
            <button class="pop-button" style="background: linear-gradient(to bottom, #555, #222); box-shadow: 0 4px #000;">設定</button>
        </div>
    </div>

    <script type="module">
        let wordList = [];
        let currentRoma = '';
        let charIndex = 0;
        let riceCount = 0;
        let isPlaying = false;

        const startScreen = document.getElementById('start-screen');
        const questionArea = document.getElementById('question-area');
        const kanjiDisplay = document.getElementById('kanji');
        const wordDisplay = document.getElementById('word');
        const riceDisplay = document.getElementById('rice-count');

        async function initGame() {
            try {
                const response = await fetch('words.json');
                wordList = await response.json();
            } catch (e) {
                kanjiDisplay.textContent = "Error!";
            }
        }

        // ゲーム開始の関数
        window.startGame = function() {
            if (isPlaying) return;
            isPlaying = true;
            startScreen.classList.add('hidden'); // スタート画面を隠す
            questionArea.classList.remove('hidden'); // 問題エリアを出す
            setWord();
        };

        function setWord() {
            if (wordList.length === 0) return;
            const pair = wordList[Math.floor(Math.random() * wordList.length)];
            kanjiDisplay.textContent = pair.kanji;
            currentRoma = pair.roma;
            charIndex = 0;
            updateDisplay();
        }

        function updateDisplay() {
            const typedPart = "_".repeat(charIndex);
            const untypedPart = currentRoma.substring(charIndex);
            wordDisplay.textContent = typedPart + untypedPart;
        }

        window.addEventListener('keydown', (e) => {
            // スペースキーで開始
            if (e.code === "Space" && !isPlaying) {
                e.preventDefault();
                startGame();
                return;
            }

            if (!isPlaying || e.key.length !== 1) return;

            if (e.key === currentRoma[charIndex]) {
                charIndex++;
                riceCount++;
                riceDisplay.textContent = riceCount.toLocaleString();
                if (charIndex === currentRoma.length) {
                    setWord();
                } else {
                    updateDisplay();
                }
            }
        });

        initGame();
    </script>
</body>
</html>
