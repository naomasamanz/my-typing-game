<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お米タイピング</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: repeating-linear-gradient(45deg, #666, #666 10px, #777 10px, #777 20px);
            font-family: "Hiragino Sans", "Meiryo", sans-serif;
            overflow: hidden;
        }

        #game-window {
            width: 400px;
            height: 300px;
            background-color: #333;
            border: 5px solid #222;
            border-radius: 12px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            background-image: radial-gradient(#444 1px, transparent 1px);
            background-size: 10px 10px;
        }

        #score-board {
            position: absolute;
            top: 15px;
            left: 20px;
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
        }

        h1 {
            position: absolute;
            top: 60px; 
            width: 100%;
            text-align: center;
            font-size: 2.2rem;
            color: #ffcc00;
            margin: 0;
            font-family: 'Arial Black', sans-serif;
            -webkit-text-stroke: 1.5px #fff;
        }

        #question-area {
            position: absolute;
            top: 130px; 
            width: 100%;
            text-align: center;
        }

        /* 漢字：ここを大きく、目立つ白に！ */
        #kanji {
            font-size: 2.4rem; /* 1.2remから大幅アップ */
            font-weight: bold;
            color: #f00e5ff;
            margin-bottom: 5px;
            height: 1.3em;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        /* ローマ字：ここを小さく、スッキリと！ */
        #word {
            font-size: 1.4rem; /* 2.6remから小さくしたよ */
            font-weight: bold;
            color: #0d0;
            font-family: 'Courier New', Courier, monospace;
            white-space: nowrap;
            letter-spacing: 1px;
        }

        .btn-group {
            position: absolute;
            bottom: 35px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .pop-button {
            padding: 8px 18px;
            font-size: 0.9rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(to bottom, #ff9900, #cc7700);
            border: none;
            border-radius: 20px;
            box-shadow: 0 4px #995500;
            cursor: pointer;
        }

        .pop-button:active {
            box-shadow: none;
            transform: translateY(4px);
        }

        .version {
            position: absolute;
            bottom: 10px;
            right: 15px;
            color: #666;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

    <div id="game-window">
        <div id="score-board">スコア: <span id="rice-count">0</span> 粒</div>
        
        <h1>お米タイピング</h1>
        
        <div id="question-area">
            <div id="kanji">Loading...</div>
            <div id="word"></div>
        </div>

        <div class="btn-group">
            <button class="pop-button" onclick="location.reload()">リセット</button>
            <button class="pop-button" style="background: linear-gradient(to bottom, #555, #222); box-shadow: 0 4px #000;">設定</button>
        </div>

        <div class="version">Ver.1.0 ©KomeTyping</div>
    </div>

    <script type="module">
        let wordList = [];
        let currentRoma = '';
        let charIndex = 0;
        let riceCount = 0;

        const kanjiDisplay = document.getElementById('kanji');
        const wordDisplay = document.getElementById('word');
        const riceDisplay = document.getElementById('rice-count');

        async function initGame() {
            try {
                const response = await fetch('words.json');
                wordList = await response.json();
                setWord();
            } catch (e) {
                kanjiDisplay.textContent = "Error!";
                wordDisplay.textContent = "words.jsonを確認してね";
            }
        }

        function setWord() {
            if (wordList.length === 0) return;
            const pair = wordList[Math.floor(Math.random() * wordList.length)];
            kanjiDisplay.textContent = pair.kanji;
            currentRoma = pair.roma;
            charIndex = 0;
            updateDisplay();
        }

        function updateDisplay() {
            const typedPart = "_".repeat(charIndex);
            const untypedPart = currentRoma.substring(charIndex);
            wordDisplay.textContent = typedPart + untypedPart;
        }

        window.addEventListener('keydown', (e) => {
            if (e.key.length !== 1) return;
            if (e.key === currentRoma[charIndex]) {
                charIndex++;
                riceCount++;
                riceDisplay.textContent = riceCount.toLocaleString();
                if (charIndex === currentRoma.length) {
                    setWord();
                } else {
                    updateDisplay();
                }
            }
        });

        initGame();
    </script>
</body>
</html>
