<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お米タイピング</title>
    <style>
        /* 1. 背景：Pop風の斜めストライプ */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: repeating-linear-gradient(
                45deg,
                #444,
                #444 20px,
                #555 20px,
                #555 40px
            );
            font-family: 'Arial Black', "Hiragino Sans", "Meiryo", sans-serif;
            overflow: hidden;
            color: white;
        }

        /* 2. ゲーム画面：角丸で透ける黒い箱 */
        #game-container {
            background-color: rgba(0, 0, 0, 0.7);
            border: 6px solid #888;
            border-radius: 40px;
            padding: 60px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            width: 80%;
            max-width: 800px;
            position: relative;
        }

        /* 3. タイトル：黄色で白フチ、少し斜め */
        h1 {
            font-size: 4rem;
            color: #ffcc00;
            text-shadow: 
                4px 4px 0 #fff, -4px -4px 0 #fff,
                4px -4px 0 #fff, -4px 4px 0 #fff;
            transform: rotate(-4deg);
            margin-bottom: 50px;
            letter-spacing: 5px;
        }

        /* 4. スコア表示（粒数） */
        #score-display {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 20px;
        }

        #kanji {
            font-size: 2.2rem;
            color: #ccc;
            margin-bottom: 10px;
            height: 1.2em;
        }

        #word {
            font-size: 5rem;
            font-weight: bold;
            color: #00d4ff; /* 水色っぽくして目立たせる */
            text-shadow: 2px 2px 10px rgba(0,212,255,0.5);
            font-family: 'Courier New', Courier, monospace;
        }

        /* 5. ぷっくりしたボタン */
        .pop-button {
            margin-top: 40px;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(to bottom, #ff9900, #cc7700);
            border: none;
            border-radius: 50px;
            box-shadow: 0 6px #995500;
            cursor: pointer;
            transition: 0.1s;
        }

        .pop-button:active {
            box-shadow: none;
            transform: translateY(6px);
        }

        .typed { color: #555; }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>お米タイピング</h1>
        
        <div id="score-display"><span id="rice-count">0</span> 粒</div>
        
        <div id="kanji">Loading...</div>
        <div id="word"></div>

        <button class="pop-button" onclick="location.reload()">リセット</button>
    </div>

    <script type="module">
        let wordList = [];
        let currentRoma = '';
        let charIndex = 0;
        let riceCount = 0; // スコア用

        const kanjiDisplay = document.getElementById('kanji');
        const wordDisplay = document.getElementById('word');
        const riceDisplay = document.getElementById('rice-count');

        async function initGame() {
            try {
                // ここで自分のURLのwords.jsonを読み込む
                const response = await fetch('words.json');
                wordList = await response.json();
                setWord();
            } catch (e) {
                kanjiDisplay.textContent = "Error!";
                wordDisplay.textContent = "words.jsonが見つからないよ";
            }
        }

        function setWord() {
            if (wordList.length === 0) return;
            const pair = wordList[Math.floor(Math.random() * wordList.length)];
            kanjiDisplay.textContent = pair.kanji;
            currentRoma = pair.roma;
            charIndex = 0;
            updateDisplay();
        }

        function updateDisplay() {
            const typedPart = "_".repeat(charIndex);
            const untypedPart = currentRoma.substring(charIndex);
            wordDisplay.textContent = typedPart + untypedPart;
        }

        window.addEventListener('keydown', (e) => {
            if (e.key.length !== 1) return;

            if (e.key === currentRoma[charIndex]) {
                charIndex++;
                riceCount++; // 1文字打つたびにお米が増える！
                riceDisplay.textContent = riceCount.toLocaleString();

                if (charIndex === currentRoma.length) {
                    setWord();
                } else {
                    updateDisplay();
                }
            } else {
                // ミスした時の軽い演出（コンソール）
                console.log("Miss!");
            }
        });

        initGame();
    </script>
</body>
</html>
